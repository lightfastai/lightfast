name: db-migrate
run-name: db-migrate / ${{ github.actor }} / ${{ github.run_number }}

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "migrate" to open and deploy a PlanetScale deploy request'
        required: true
        type: string

concurrency:
  group: db-migration
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  db-migrate-planetscale:
    name: db-migrate-planetscale
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'migrate'
    timeout-minutes: 20
    env:
      PLANETSCALE_DATABASE_NAME: ${{ secrets.PLANETSCALE_DATABASE_NAME }}
      PLANETSCALE_ORG_NAME: ${{ secrets.PLANETSCALE_ORG_NAME }}
      PLANETSCALE_SERVICE_TOKEN_ID: ${{ secrets.PLANETSCALE_SERVICE_TOKEN_ID }}
      PLANETSCALE_SERVICE_TOKEN: ${{ secrets.PLANETSCALE_SERVICE_TOKEN }}
      PSCALE_BRANCH_NAME: staging

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-pnpm
        uses: pnpm/action-setup@v4

      - name: setup-node-22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: setup-pscale
        uses: planetscale/setup-pscale-action@v1

      - name: install-dependencies
        run: pnpm install --frozen-lockfile

      - name: assert-staging-branch-exists
        run: |
          if ! pscale branch show "$PLANETSCALE_DATABASE_NAME" "$PSCALE_BRANCH_NAME" --org "$PLANETSCALE_ORG_NAME" >/dev/null; then
            echo "staging branch missing - run the one-time bootstrap documented in db/CLAUDE.md" >&2
            exit 1
          fi

      - name: create-branch-password
        run: |
          response=$(pscale password create "$PLANETSCALE_DATABASE_NAME" "$PSCALE_BRANCH_NAME" "github-actions-${GITHUB_RUN_ID}" -f json --org "$PLANETSCALE_ORG_NAME")
          password_id=$(echo "$response" | jq -r '.id')
          host=$(echo "$response" | jq -r '.access_host_url')
          username=$(echo "$response" | jq -r '.username')
          password=$(echo "$response" | jq -r '.plain_text')

          echo "::add-mask::$password"
          echo "PSCALE_PASSWORD_ID=$password_id" >> "$GITHUB_ENV"
          echo "DATABASE_HOST=$host" >> "$GITHUB_ENV"
          echo "DATABASE_USERNAME=$username" >> "$GITHUB_ENV"
          echo "DATABASE_PASSWORD=$password" >> "$GITHUB_ENV"
          echo "DATABASE_NAME=$PLANETSCALE_DATABASE_NAME" >> "$GITHUB_ENV"

      - name: show-pending-migrations
        working-directory: db/app
        run: |
          echo "Pending migration files:"
          ls -la src/migrations/*.sql
          echo "---"
          echo "Migration journal:"
          cat src/migrations/meta/_journal.json

      - name: run-migrations-on-branch
        working-directory: db/app
        run: pnpm db:migrate

      - name: open-deploy-request
        run: |
          set +e
          existing=$(pscale deploy-request show "$PLANETSCALE_DATABASE_NAME" "$PSCALE_BRANCH_NAME" --org "$PLANETSCALE_ORG_NAME" -f json 2>/dev/null)
          show_exit=$?
          set -e

          if [ "$show_exit" -eq 0 ]; then
            deploy_request_number=$(echo "$existing" | jq -r '.number')
            deploy_request_state=$(echo "$existing" | jq -r '.state // ""')

            if [ "$deploy_request_state" != "closed" ]; then
              echo "DEPLOY_REQUEST_NUMBER=$deploy_request_number" >> "$GITHUB_ENV"
              echo "HAS_SCHEMA_CHANGES=true" >> "$GITHUB_ENV"
              echo "Using existing deploy request $deploy_request_number."
              exit 0
            fi

            echo "Ignoring closed deploy request $deploy_request_number."
          fi

          set +e
          response=$(pscale deploy-request create "$PLANETSCALE_DATABASE_NAME" "$PSCALE_BRANCH_NAME" --into main --notes "GitHub Actions run ${GITHUB_RUN_ID}" --org "$PLANETSCALE_ORG_NAME" -f json 2>&1)
          create_exit=$?
          set -e

          if [ "$create_exit" -ne 0 ]; then
            if echo "$response" | grep -Eiq "no schema changes|no changes|nothing to deploy|identical|not different"; then
              echo "No schema changes detected between staging and main; skipping deploy."
              echo "HAS_SCHEMA_CHANGES=false" >> "$GITHUB_ENV"
              exit 0
            fi

            echo "$response" >&2
            exit "$create_exit"
          fi

          deploy_request_number=$(echo "$response" | jq -r '.number')
          echo "DEPLOY_REQUEST_NUMBER=$deploy_request_number" >> "$GITHUB_ENV"
          echo "HAS_SCHEMA_CHANGES=true" >> "$GITHUB_ENV"
          echo "Opened deploy request $deploy_request_number."

      - name: check-schema-lint
        if: env.HAS_SCHEMA_CHANGES == 'true'
        run: |
          deploy_request=$(pscale deploy-request show "$PLANETSCALE_DATABASE_NAME" "$DEPLOY_REQUEST_NUMBER" --org "$PLANETSCALE_ORG_NAME" -f json)
          echo "$deploy_request" | jq .

          lint_errors=$(echo "$deploy_request" | jq -c '
            [
              .. | objects
              | select(
                  ((has("type") and (.type | tostring | ascii_downcase | contains("error"))) or
                   (has("severity") and (.severity | tostring | ascii_downcase == "error")) or
                   (has("state") and (.state | tostring | ascii_downcase == "error")) or
                   (has("status") and (.status | tostring | ascii_downcase == "error")))
                )
            ]
          ')

          if [ "$lint_errors" != "[]" ]; then
            echo "Schema lint errors detected:" >&2
            echo "$lint_errors" | jq . >&2
            exit 1
          fi

      - name: deploy-schema-changes
        if: env.HAS_SCHEMA_CHANGES == 'true'
        run: |
          for attempt in {1..18}; do
            set +e
            output=$(pscale deploy-request deploy "$PLANETSCALE_DATABASE_NAME" "$DEPLOY_REQUEST_NUMBER" --org "$PLANETSCALE_ORG_NAME" --wait 2>&1)
            deploy_exit=$?
            set -e

            if [ "$deploy_exit" -eq 0 ]; then
              echo "$output"
              exit 0
            fi

            if echo "$output" | grep -Eiq "currently validating|try again in a few moments"; then
              echo "PlanetScale is still validating deploy request ${DEPLOY_REQUEST_NUMBER}; retrying (${attempt}/18)."
              sleep 20
              continue
            fi

            echo "$output" >&2
            exit "$deploy_exit"
          done

          echo "Timed out waiting for PlanetScale deploy request ${DEPLOY_REQUEST_NUMBER} to become deployable." >&2
          exit 1

      - name: delete-branch-password
        if: always() && env.PSCALE_PASSWORD_ID != ''
        run: |
          pscale password delete "$PLANETSCALE_DATABASE_NAME" "$PSCALE_BRANCH_NAME" "$PSCALE_PASSWORD_ID" --force --org "$PLANETSCALE_ORG_NAME"

      - name: summarize-migration
        run: |
          if [ "$HAS_SCHEMA_CHANGES" = "true" ]; then
            echo "Database migrations deployed through PlanetScale deploy request ${DEPLOY_REQUEST_NUMBER}."
          else
            echo "Database migrations applied to staging; no schema deploy was needed."
          fi

  db-migrate-confirmation-required:
    name: db-migrate-confirmation-required
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.inputs.confirm != 'migrate'
    steps:
      - name: show-confirmation-error
        run: |
          echo "Migration was not confirmed."
          echo "You must type 'migrate' in the confirmation input."
          exit 1
