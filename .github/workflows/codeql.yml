name: codeql-security
run-name: codeql-security / ${{ github.event_name }} / ${{ github.head_ref || github.ref_name }}

on:
  push:
    branches: [main]
  # PR trigger removed — CodeQL runs on merge-queue (see merge-queue.yml) + main push + weekly cron
  schedule:
    - cron: "30 3 * * 1"

jobs:
  codeql-analyze:
    name: codeql-analyze-${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: initialize-codeql
        uses: github/codeql-action/init@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: analyze-codeql
        uses: github/codeql-action/analyze@ed410739ba306e4ebe5e123421a6bd694e494a2b # v4
        with:
          category: "/language:${{ matrix.language }}"
