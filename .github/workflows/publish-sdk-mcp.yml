name: Publish SDK + MCP

on:
  push:
    paths:
      - '.changeset/**'
      - '.github/workflows/publish-sdk-mcp.yml'
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Publish SDK + MCP
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Configure git user
        run: |
          git config --global user.name 'lightfast-release-bot'
          git config --global user.email 'releases@lightfast.ai'

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reject CLI changesets
        run: |
          CLI_CHANGESETS="$(grep -R -n '"@lightfastai/cli"' .changeset/*.md 2>/dev/null || true)"
          if [ -n "$CLI_CHANGESETS" ]; then
            echo "$CLI_CHANGESETS"
            echo "::error::@lightfastai/cli releases must not use the SDK/MCP workflow. Follow RELEASE.md#cli-workflow instead."
            exit 1
          fi

      - name: Build SDK + MCP packages
        env:
          SKIP_ENV_VALIDATION: "true"
        run: pnpm turbo build --filter=lightfast --filter=@lightfastai/mcp --summarize

      - name: Run tests
        env:
          SKIP_ENV_VALIDATION: "true"
        run: pnpm turbo test --filter=@repo/api-contract --filter=lightfast --filter=@lightfastai/mcp --summarize

      - name: Cache report
        if: always()
        uses: ./.github/actions/turbo-summary
        with:
          title: 'Turbo cache report — Publish SDK + MCP'
          artifact-name: turbo-cache-publish-sdk-mcp

      - name: Validate package tarballs
        run: |
          echo "Packing tarballs to validate manifests..."
          SCRATCH=$(mktemp -d)
          (cd core/lightfast && npm pack --pack-destination "$SCRATCH")
          (cd core/mcp && npm pack --pack-destination "$SCRATCH")
          echo "Inspecting lightfast manifest..."
          tar -xzOf "$SCRATCH"/lightfast-*.tgz package/package.json | jq -e '.dependencies | keys | all(. as $k | $k | startswith("@orpc/"))' \
            || (echo "❌ lightfast has unexpected runtime deps"; tar -xzOf "$SCRATCH"/lightfast-*.tgz package/package.json | jq '.dependencies'; exit 1)
          echo "Inspecting @lightfastai/mcp manifest..."
          tar -xzOf "$SCRATCH"/lightfastai-mcp-*.tgz package/package.json | jq -e '.dependencies | keys == ["@modelcontextprotocol/sdk"]' \
            || (echo "❌ @lightfastai/mcp has unexpected runtime deps"; tar -xzOf "$SCRATCH"/lightfastai-mcp-*.tgz package/package.json | jq '.dependencies'; exit 1)
          echo "✅ Tarball manifests valid"

      - name: Create SDK/MCP Version PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Verify SDK/MCP latest versions match
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Verifying SDK/MCP packages published successfully to latest tag..."
          sleep 10

          LIGHTFAST_VERSION=$(npm view lightfast@latest version)
          MCP_VERSION=$(npm view @lightfastai/mcp@latest version)

          echo "lightfast@latest: $LIGHTFAST_VERSION"
          echo "@lightfastai/mcp@latest: $MCP_VERSION"

          if [ "$LIGHTFAST_VERSION" != "$MCP_VERSION" ]; then
            echo "❌ ERROR: Version drift detected on latest tag!"
            echo "lightfast@$LIGHTFAST_VERSION != @lightfastai/mcp@$MCP_VERSION"
            echo "Manual intervention required - publish the missing package"
            exit 1
          fi

          if [[ "$LIGHTFAST_VERSION" == *-* ]]; then
            echo "❌ ERROR: latest must point at a stable SDK/MCP version, got $LIGHTFAST_VERSION"
            exit 1
          fi

          echo "✅ Both packages at $LIGHTFAST_VERSION on latest tag"

      - name: Send a Slack notification if a publish happens
        if: steps.changesets.outputs.published == 'true'
        # TODO: First users are through Slack/Discord channels. Notify via Pylon + Lightfast
        # integration to post release notes to each team's custom channel.
        run: echo "A new stable SDK/MCP version was published!"
