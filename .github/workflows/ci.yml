name: CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'core/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'core/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - '.github/workflows/ci.yml'

# Cancel previous runs on new pushes to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm turbo //#check --summarize

      - name: Type check affected packages
        env:
          SKIP_ENV_VALIDATION: "true"
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm turbo typecheck --affected --continue --summarize

      - name: Test affected public oRPC surface
        env:
          SKIP_ENV_VALIDATION: "true"
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm turbo test --affected --filter=@repo/api-contract --filter=@api/app --filter=lightfast --filter=@lightfastai/mcp --filter=@vendor/mcp --continue --summarize

      - name: Check boundaries
        run: pnpm turbo boundaries

      - name: Cache report
        if: always()
        uses: ./.github/actions/turbo-summary
        with:
          title: 'Turbo cache report — CI / Quality'
          artifact-name: turbo-cache-ci-quality

  # Summary job (required status check)
  ci-success:
    name: CI Success
    if: always()
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate results
        run: |
          quality="${{ needs.quality.result }}"

          echo "quality.result = $quality"

          if [[ "$quality" != "success" ]]; then
            echo "CI quality checks failed."
            exit 1
          fi

          echo "All CI checks passed."
